name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact_name: trust-linux-x86_64
            archive_name: trust-linux-x86_64.tar.gz
            binary_name: trust
          - name: macOS
            os: macos-latest
            artifact_name: trust-macos
            archive_name: trust-macos.tar.gz
            binary_name: trust
          - name: Windows
            os: windows-latest
            artifact_name: trust-windows-x86_64
            archive_name: trust-windows-x86_64.zip
            binary_name: trust.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
          cp README.md LICENSE "dist/${{ matrix.artifact_name }}/"
          tar -czf "dist/${{ matrix.archive_name }}" -C dist "${{ matrix.artifact_name }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact_name }}" | Out-Null
          Copy-Item "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
          Copy-Item README.md, LICENSE "dist/${{ matrix.artifact_name }}/"
          Compress-Archive `
            -Path "dist/${{ matrix.artifact_name }}" `
            -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: trust-*

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist -type f | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --title "$TAG_NAME" --generate-notes
          fi
